name: Test checks

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest

    env:
      MONGODB_TEST_URL: mongodb://localhost:27017/

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python3
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: "8.0"

      - name: Run pytest
        run: |
          pytest

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Ruff - Install
        run: pip install ruff

      - name: Ruff - Check linting
        run: ruff check .

      - name: Ruff - Check formatting
        run: ruff format --check .

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Run Pyright
        run: pyright --outputjson .
